# Serves the SPA and reverse-proxies the API so the browser only ever talks to
# a single origin (https://improveit.today). The frontend calls the API with
# relative paths (axios.create() with no baseURL → /api/...), so /api is
# forwarded here to the internal api-gateway. No CORS is needed this way.

upstream api_gateway {
    # Container name of the gateway on the shared Docker network.
    server api-gateway:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Uploads (photos on the report form) — keep in step with the gateway's
    # express.json({ limit: '10mb' }) / media-service limits.
    client_max_body_size 12m;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # API → gateway. Preserve the /api prefix; the gateway strips it itself.
    location /api/ {
        proxy_pass http://api_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Long-cache hashed build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA history fallback — every other path serves index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
