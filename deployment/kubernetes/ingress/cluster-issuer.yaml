# cert-manager ClusterIssuers for automatic Let's Encrypt TLS certificates.
#
# Prereq (install cert-manager once per cluster):
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/latest/download/cert-manager.yaml
#
# Use the -staging issuer first to avoid Let's Encrypt rate limits while
# testing (it issues untrusted certs), then switch the Ingress annotation to
# letsencrypt-prod once the DNS + HTTP-01 challenge succeed.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: ops@improveit.today
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ops@improveit.today
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
