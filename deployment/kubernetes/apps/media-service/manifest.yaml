apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-service
  labels:
    app: media-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: media-service
  template:
    metadata:
      labels:
        app: media-service
    spec:
      containers:
        - name: media-service
          image: ghcr.io/pvutrix/improveit/media-service:latest
          ports:
            - containerPort: 8010
          env:
            - name: NODE_ENV
              value: "production"
            - name: STORAGE_ENDPOINT
              value: "http://improveit-minio.default.svc:9000"
            - name: STORAGE_BUCKET
              value: "media"
          livenessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: media-service
spec:
  selector:
    app: media-service
  ports:
    - protocol: TCP
      port: 8010
      targetPort: 8010
  type: ClusterIP
