apiVersion: apps/v1
kind: Deployment
metadata:
  name: geolocation-service
  labels:
    app: geolocation-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: geolocation-service
  template:
    metadata:
      labels:
        app: geolocation-service
    spec:
      containers:
        - name: geolocation-service
          image: ghcr.io/pvutrix/improveit/geolocation-service:latest
          ports:
            - containerPort: 8004
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: geolocation-service-dsn
          livenessProbe:
            httpGet:
              path: /health
              port: 8004
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: geolocation-service
spec:
  selector:
    app: geolocation-service
  ports:
    - protocol: TCP
      port: 8004
      targetPort: 8004
  type: ClusterIP
