apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/pvutrix/improveit/api-gateway:latest
          ports:
            - containerPort: 8000
          env:
            - name: NODE_ENV
              value: "production"
            - name: API_GATEWAY_PORT
              value: "8000"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: jwt-secret
            - name: CORS_ORIGIN
              value: "https://improveit.today"
            - name: USER_SERVICE_URL
              value: "http://user-service:8001"
            - name: PROBLEM_SERVICE_URL
              value: "http://problem-service:8002"
            - name: VOTING_SERVICE_URL
              value: "http://voting-service:8003"
            - name: GEOLOCATION_SERVICE_URL
              value: "http://geolocation-service:8004"
            - name: AUTHORITY_SERVICE_URL
              value: "http://authority-service:8005"
            - name: PAYMENT_SERVICE_URL
              value: "http://payment-service:8006"
            - name: BIDDING_SERVICE_URL
              value: "http://bidding-service:8007"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:8008"
            - name: MEDIA_SERVICE_URL
              value: "http://media-service:8010"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: LoadBalancer
